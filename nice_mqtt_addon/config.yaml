name: "Nice Gate Custom Bridge"
version: "2.0.0"
slug: "nice_gate_custom"
description: "Custom Bridge for Nice Gate devices (multi-gate support)"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: application
boot: auto
map:
  - config:rw
init: false
options:
  mqtt_broker: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  gates:
    - name: "Gate"
      device_id: "nice_gate_it4wifi"
      nice_host: ""
      nice_mac: ""
      setup_code: ""
      nice_pwd: ""

schema:
  mqtt_broker: str
  mqtt_port: int
  mqtt_user: str
  mqtt_pass: password
  gates:
    - name: str
      device_id: str?
      nice_host: str
      nice_mac: str
      setup_code: str?
      nice_pwd: password?
